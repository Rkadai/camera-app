<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CAMERA POOL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    /* ナビゲーション */
    .nav {
      padding: 20px 20px 16px;
      background: linear-gradient(180deg, #0a1628 0%, #000 100%);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
    }
    .nav-label { font-size: 11px; font-weight: 600; color: #0a84ff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .nav-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -.5px; }
    .nav-sub { font-size: 12px; color: #8e8e93; margin-top: 3px; }
    .menu-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: none;
      color: #8e8e93;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 6px;
      transition: background .15s;
    }
    .menu-btn.active { background: rgba(10,132,255,.2); color: #0a84ff; }

    /* ドロップダウン */
    .dropdown {
      display: none;
      position: absolute;
      top: 72px; right: 16px;
      background: #2c2c2e;
      border-radius: 14px;
      width: 180px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .dropdown.show { display: block; }
    .drop-item {
      padding: 13px 16px;
      font-size: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 0.5px solid #3a3a3c;
      cursor: pointer;
      text-decoration: none;
    }
    .drop-item:last-child { border: none; }
    .drop-item:hover { background: rgba(255,255,255,.06); }
    .drop-icon { font-size: 16px; }

    /* セクションタイトル */
    .sec-title {
      font-size: 11px; font-weight: 600; color: #8e8e93;
      letter-spacing: .5px; text-transform: uppercase;
      padding: 14px 20px 8px;
    }

    /* カメラカード */
    .card-list { padding: 0 16px; display: flex; flex-direction: column; gap: 1px; }
    .camera-card {
      background: #1c1c1e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background .1s;
    }
    .camera-card:first-child { border-radius: 14px 14px 0 0; }
    .camera-card:last-child { border-radius: 0 0 14px 14px; }
    .camera-card:only-child { border-radius: 14px; }
    .camera-card:hover { background: #2c2c2e; }
    .card-divider { height: 0.5px; background: #2c2c2e; margin: 0 16px; }
    .cam-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .icon-ok { background: rgba(10,132,255,.15); }
    .icon-ng { background: rgba(255,59,48,.15); }
    .cam-info { flex: 1; }
    .cam-name { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -.2px; }
    .cam-status-ok { font-size: 12px; color: #0a84ff; margin-top: 2px; }
    .cam-status-ng { font-size: 12px; color: #ff3b30; margin-top: 2px; }
    .cam-sd { font-size: 11px; color: #3a3a3c; margin-top: 2px; }
    .cam-arrow { font-size: 18px; color: #3a3a3c; }

    /* スキャンボタン */
    .scan-btn {
      margin: 20px 16px 8px;
      background: #0a84ff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      width: calc(100% - 32px);
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      letter-spacing: -.2px;
      transition: opacity .15s;
    }
    .scan-btn:active { opacity: .8; }

    /* モーダル共通 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal.show { display: flex; }

    /* QRモーダル */
    #qr-modal { align-items: center; }
    #qr-box {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }
    #qr-box h3 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    #qr-canvas { margin: 0 auto; }
    #qr-canvas img, #qr-canvas canvas { border-radius: 8px; }
    .qr-btn-row { display: flex; gap: 10px; margin-top: 16px; }
    .qr-print-btn {
      flex: 1; padding: 12px;
      background: #0a84ff; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; color: #fff; cursor: pointer;
    }
    .qr-close-btn {
      flex: 1; padding: 12px;
      background: #3a3a3c; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; color: #fff; cursor: pointer;
    }

    /* 貸出モーダル */
    #borrow-modal { align-items: flex-end; }
    #borrow-box {
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
    }
    #borrow-box h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .borrow-cam-label { font-size: 13px; color: #8e8e93; margin-bottom: 24px; }
    .form-label { font-size: 13px; color: #8e8e93; margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: #2c2c2e; border: none; border-radius: 12px;
      color: #fff; font-size: 16px; margin-bottom: 16px;
      font-family: -apple-system, sans-serif;
    }
    .form-input:focus { outline: 2px solid #0a84ff; }
    .checkbox-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; cursor: pointer;
    }
    .checkbox-row input { width: 20px; height: 20px; accent-color: #0a84ff; cursor: pointer; }
    .checkbox-row label { font-size: 15px; color: #fff; cursor: pointer; }
    #sd-name-area { display: none; margin-bottom: 16px; }
    .borrow-confirm-btn {
      width: 100%; padding: 16px;
      background: #0a84ff; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 600; color: #fff; cursor: pointer;
      margin-top: 8px;
    }
    .borrow-cancel-btn {
      width: 100%; padding: 14px;
      background: transparent; border: none;
      font-size: 15px; color: #8e8e93; cursor: pointer; margin-top: 4px;
    }

    /* 履歴モーダル */
    #history-modal { align-items: flex-end; }
    #history-box {
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-height: 75vh;
      overflow-y: auto;
    }
    #history-box h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .history-row {
      padding: 12px 0;
      border-bottom: 0.5px solid #2c2c2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-row:last-child { border: none; }
    .history-borrower { font-size: 14px; font-weight: 500; color: #fff; }
    .history-sd { font-size: 11px; color: #0a84ff; margin-top: 2px; }
    .history-action-borrow { font-size: 12px; color: #ff3b30; }
    .history-action-return { font-size: 12px; color: #0a84ff; }
    .history-date { font-size: 11px; color: #8e8e93; margin-top: 2px; text-align: right; }
    .history-close-btn {
      width: 100%; padding: 14px;
      background: #2c2c2e; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600; color: #fff; cursor: pointer;
      margin-top: 16px;
    }
    .history-empty { font-size: 14px; color: #8e8e93; padding: 20px 0; text-align: center; }

    /* スキャンモーダル */
    #scan-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      flex-direction: column;
    }
    #scan-modal.show { display: flex; }
    .scan-header {
      padding: 56px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .scan-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .scan-close-btn {
      padding: 6px 16px;
      background: #2c2c2e;
      border: none; border-radius: 20px;
      font-size: 14px; color: #fff; cursor: pointer;
    }
    #scan-reader {
      flex: 1;
      overflow: hidden;
    }
    #scan-reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    .scan-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 220px; height: 220px;
      border: 2px solid #0a84ff;
      border-radius: 20px;
      pointer-events: none;
    }
    .scan-result {
      padding: 20px;
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      text-align: center;
      font-size: 15px;
      color: #fff;
      min-height: 60px;
    }

    /* 読み込み */
    .loading { color: #8e8e93; font-size: 14px; padding: 24px 20px; text-align: center; }

    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    }
  </style>
</head>
<style>
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(28,28,30,.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid #2c2c2e;
      display: flex;
      padding: 8px 0 28px;
      z-index: 50;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: #3a3a3c;
      letter-spacing: .3px;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
    }
    .tab-item.on { color: #0a84ff; }
    .tab-icon { font-size: 22px; display: block; margin-bottom: 2px; }
    .tab-spacer { height: 80px; }
  </style>

  <div class="tab-spacer"></div>
  <div class="tab-bar">
    <div class="tab-item on">
      <span class="tab-icon">⊞</span>一覧
    </div>
    <div class="tab-item" onclick="openScan()">
      <span class="tab-icon">⊙</span>スキャン
    </div>
  </div>
<body>

  <!-- ナビゲーション -->
  <div class="nav">
    <div>
      <div class="nav-label">写真部</div>
      <div class="nav-title">CAMERA POOL</div>
      <div class="nav-sub">機材管理システム</div>
    </div>
    <button class="menu-btn" id="menu-btn" onclick="toggleMenu()">⋯</button>
  </div>

  <!-- ドロップダウンメニュー -->
  <div class="dropdown" id="dropdown">
    <a class="drop-item" href="admin.html"><span class="drop-icon">📊</span>管理画面を開く</a>
    <div class="drop-item" onclick="loadCameras();closeMenu()"><span class="drop-icon">🔄</span>一覧を更新する</div>
  </div>

  <!-- カメラ一覧 -->
  <div class="sec-title">機材一覧</div>
  <div id="camera-list" class="card-list"><div class="loading">読み込み中...</div></div>

  <!-- スキャンボタン -->
  <button class="scan-btn" onclick="openScan()">📷　QRをスキャンして借りる / 返す</button>

  <!-- QRモーダル -->
  <div class="modal" id="qr-modal">
    <div id="qr-box">
      <h3 id="qr-name"></h3>
      <div id="qr-canvas"></div>
      <div id="print-area" style="display:none">
        <div id="print-canvas"></div>
        <p id="print-name" style="color:#000;font-weight:bold;margin-top:8px"></p>
      </div>
      <div class="qr-btn-row">
        <button class="qr-print-btn" onclick="printQR()">🖨️ 印刷</button>
        <button class="qr-close-btn" onclick="closeQR()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 貸出モーダル -->
  <div class="modal" id="borrow-modal">
    <div id="borrow-box">
      <h3>カメラを借りる</h3>
      <div class="borrow-cam-label" id="borrow-cam-label"></div>
      <div class="form-label">あなたの名前</div>
      <input class="form-input" id="borrow-name" type="text" placeholder="例: 山田太郎">
      <div class="checkbox-row">
        <input type="checkbox" id="sd-check" onchange="toggleSD()">
        <label for="sd-check">自分のSDカードを持っている</label>
      </div>
      <div id="sd-name-area">
        <div class="form-label">SDカードのメモ</div>
        <input class="form-input" id="sd-name" type="text" placeholder="例: SanDisk 64GB">
      </div>
      <button class="borrow-confirm-btn" onclick="confirmBorrow()">借りる</button>
      <button class="borrow-cancel-btn" onclick="closeBorrow()">キャンセル</button>
    </div>
  </div>

  <!-- 履歴モーダル -->
  <div class="modal" id="history-modal">
    <div id="history-box">
      <h3 id="history-title"></h3>
      <div id="history-content"></div>
      <button class="history-close-btn" onclick="closeHistory()">閉じる</button>
    </div>
  </div>

  <!-- スキャンモーダル -->
  <div id="scan-modal">
    <div class="scan-header">
      <h2>QRスキャン</h2>
      <button class="scan-close-btn" onclick="closeScan()">閉じる</button>
    </div>
    <div id="scan-reader" style="position:relative;flex:1">
      <div class="scan-overlay"></div>
    </div>
    <div class="scan-result" id="scan-result">カメラのQRコードを読み取ってください</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fvsziepnqtthutpsvtjl.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2c3ppZXBucXR0aHV0cHN2dGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTAyMzksImV4cCI6MjA5MzA4NjIzOX0.mjIWmBHp0I-kBYk5UNNmRKzQipMtlDQIRjVRaxP3QUk'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let html5QrCode = null
    let currentQRId = null
    let currentQRName = null
    let pendingCam = null

    // メニュー
    function toggleMenu() {
      const dd = document.getElementById('dropdown')
      const btn = document.getElementById('menu-btn')
      dd.classList.toggle('show')
      btn.classList.toggle('active')
    }
    function closeMenu() {
      document.getElementById('dropdown').classList.remove('show')
      document.getElementById('menu-btn').classList.remove('active')
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('#menu-btn') && !e.target.closest('#dropdown')) closeMenu()
    })

    // SDチェック
    function toggleSD() {
      const checked = document.getElementById('sd-check').checked
      document.getElementById('sd-name-area').style.display = checked ? 'block' : 'none'
    }

    // QR表示
    function showQR(cameraId, cameraName) {
      currentQRId = cameraId; currentQRName = cameraName
      document.getElementById('qr-name').textContent = cameraName
      const canvas = document.getElementById('qr-canvas')
      canvas.innerHTML = ''
      new QRCode(canvas, { text: cameraId, width: 200, height: 200 })
      document.getElementById('qr-modal').classList.add('show')
    }
    function closeQR() { document.getElementById('qr-modal').classList.remove('show') }
    function printQR() {
      const pa = document.getElementById('print-area')
      const pc = document.getElementById('print-canvas')
      document.getElementById('print-name').textContent = currentQRName
      pc.innerHTML = ''
      new QRCode(pc, { text: currentQRId, width: 300, height: 300 })
      pa.style.display = 'block'
      setTimeout(() => { window.print(); pa.style.display = 'none' }, 300)
    }

    // 履歴
    async function showHistory(cameraName) {
      document.getElementById('history-title').textContent = cameraName + ' の履歴'
      document.getElementById('history-content').innerHTML = '<div class="history-empty">読み込み中...</div>'
      document.getElementById('history-modal').classList.add('show')
      const { data } = await db.from('history').select('*').eq('camera_name', cameraName).order('created_at', { ascending: false }).limit(20)
      if (!data || data.length === 0) {
        document.getElementById('history-content').innerHTML = '<div class="history-empty">履歴はまだありません</div>'
        return
      }
      document.getElementById('history-content').innerHTML = data.map(h => {
        const d = new Date(new Date(h.created_at).getTime() + 9 * 60 * 60 * 1000)
        const date = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`
        const sdHtml = h.sd_info ? `<div class="history-sd">💾 ${h.sd_info}</div>` : ''
        return `<div class="history-row">
          <div><div class="history-borrower">${h.borrower}</div>${sdHtml}</div>
          <div><div class="${h.action === '貸出' ? 'history-action-borrow' : 'history-action-return'}">${h.action}</div><div class="history-date">${date}</div></div>
        </div>`
      }).join('')
    }
    function closeHistory() { document.getElementById('history-modal').classList.remove('show') }

    // 貸出モーダル
    function openBorrow(cam) {
      pendingCam = cam
      document.getElementById('borrow-cam-label').textContent = cam.name
      document.getElementById('borrow-name').value = ''
      document.getElementById('sd-check').checked = false
      document.getElementById('sd-name').value = ''
      document.getElementById('sd-name-area').style.display = 'none'
      document.getElementById('borrow-modal').classList.add('show')
    }
    function closeBorrow() { document.getElementById('borrow-modal').classList.remove('show'); pendingCam = null }
    async function confirmBorrow() {
      const name = document.getElementById('borrow-name').value.trim()
      if (!name) { alert('名前を入力してください'); return }
      const hasSD = document.getElementById('sd-check').checked
      const sdName = hasSD ? document.getElementById('sd-name').value.trim() : ''
      const borrowerText = hasSD && sdName ? `${name}（自分のSD: ${sdName}）` : name
      const sdInfo = hasSD ? (sdName || '自分のSD') : 'カメラのSD'
      await db.from('cameras').update({ status: 'borrowed', borrower: borrowerText }).eq('id', pendingCam.id)
      await db.from('history').insert({ camera_name: pendingCam.name, borrower: name, action: '貸出', sd_info: sdInfo })
      closeBorrow()
      loadCameras()
    }

    // スキャン
    function openScan() {
      document.getElementById('scan-modal').classList.add('show')
      document.getElementById('scan-result').textContent = 'カメラのQRコードを読み取ってください'
      html5QrCode = new Html5Qrcode('scan-reader')
      html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: 220 },
        async decodedText => { await handleScan(decodedText) }
      )
    }
    function closeScan() {
      if (html5QrCode) {
        try { html5QrCode.stop().catch(()=>{}).finally(()=>{ html5QrCode = null }) } catch(e) { html5QrCode = null }
      }
      document.getElementById('scan-modal').classList.remove('show')
    }
    async function handleScan(cameraId) {
      try { await html5QrCode.stop() } catch(e) {}
      html5QrCode = null
      const { data: cameras } = await db.from('cameras').select('*').eq('id', cameraId)
      if (!cameras || cameras.length === 0) {
        document.getElementById('scan-result').textContent = '❌ カメラが見つかりません'
        return
      }
      const cam = cameras[0]
      document.getElementById('scan-modal').classList.remove('show')
      if (cam.status === 'available') {
        openBorrow(cam)
      } else {
        await db.from('cameras').update({ status: 'available', borrower: '' }).eq('id', cam.id)
        await db.from('history').insert({ camera_name: cam.name, borrower: cam.borrower.split('（')[0], action: '返却', sd_info: null })
        loadCameras()
        alert(`✅ ${cam.name} を返却しました！`)
      }
    }

    // カメラ一覧
    function renderCameras(data) {
      const list = document.getElementById('camera-list')
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="loading">カメラが登録されていません</div>'
        return
      }
      list.innerHTML = data.map((cam, i) => {
        const isFirst = i === 0
        const isLast = i === data.length - 1
        const isOnly = data.length === 1
        const radius = isOnly ? '14px' : isFirst ? '14px 14px 0 0' : isLast ? '0 0 14px 14px' : '0'
        const isOwn = cam.borrower && cam.borrower.includes('自分のSD')
        const sdText = cam.status === 'borrowed' ? (isOwn ? '💾 自分のSD' : '📷 カメラのSD') : ''
        const divider = (!isLast && !isOnly) ? `<div class="card-divider"></div>` : ''
        return `
          <div class="camera-card" style="border-radius:${radius}" onclick="showHistory('${cam.name}')">
            <div class="cam-icon ${cam.status === 'available' ? 'icon-ok' : 'icon-ng'}">📷</div>
            <div class="cam-info">
              <div class="cam-name">${cam.name}</div>
              <div class="${cam.status === 'available' ? 'cam-status-ok' : 'cam-status-ng'}">
                ${cam.status === 'available' ? '貸出可能' : cam.borrower}
              </div>
              ${sdText ? `<div class="cam-sd">${sdText}</div>` : ''}
            </div>
            <div class="cam-arrow">
              <button onclick="event.stopPropagation();showQR('${cam.id}','${cam.name}')" style="background:none;border:none;color:#0a84ff;font-size:12px;cursor:pointer;padding:4px 0">QR</button>
              <span style="color:#3a3a3c;margin-left:6px">›</span>
            </div>
          </div>${divider}
        `
      }).join('')
    }

    async function loadCameras() {
      const cached = localStorage.getItem('cameras_cache')
      if (cached) renderCameras(JSON.parse(cached))
      const { data, error } = await db.from('cameras').select('*')
      if (error) { console.error(error); return }
      localStorage.setItem('cameras_cache', JSON.stringify(data))
      renderCameras(data)
    }

    loadCameras()
  </script>
</body>
</html>
