<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カメラ貸出管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    h1 { font-size: 24px; letter-spacing: 2px; }
    .camera-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid #2a2a2a;
    }
    .camera-name {
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .camera-name:hover { color: #FF7A00; }
    .status-ok { color: #4ade80; }
    .status-ng { color: #f87171; }
    .sd-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      font-weight: 500;
    }
    .sd-own { background: #1a2a3a; color: #60a5fa; }
    .sd-camera { background: #2a1a0a; color: #fb923c; }
    .qr-btn, .scan-btn {
      margin-top: 8px;
      padding: 5px 12px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .scan-btn {
      font-size: 14px;
      padding: 10px 20px;
      margin: 16px 0;
      display: block;
    }
    #qr-modal, #history-modal, #borrow-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #qr-modal.show, #history-modal.show, #borrow-modal.show { display: flex; }
    #qr-box {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }
    #qr-box p { color: #111; font-weight: bold; margin-bottom: 12px; }
    #qr-print {
      margin-top: 12px;
      padding: 6px 20px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 8px;
    }
    #qr-close, #history-close {
      margin-top: 12px;
      padding: 6px 20px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #qr-canvas { margin: 0 auto; }

    /* 貸出モーダル */
    #borrow-box {
      background: #1a1a1a;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 360px;
      border: 1px solid #2a2a2a;
    }
    #borrow-box h3 { font-size: 16px; margin-bottom:4px; color: #eee; }
    #borrow-box .cam-label { font-size: 12px; color: #888; margin-bottom: 20px; }
    .form-label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    .form-input:focus { outline: none; border-color: #FF7A00; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #FF7A00;
      cursor: pointer;
    }
    .checkbox-row label {
      font-size: 14px;
      color: #eee;
      cursor: pointer;
    }
    #sd-name-area {
      display: none;
      margin-bottom: 16px;
    }
    .btn-row-borrow {
      display: flex;
      gap: 10px;
    }
    .btn-cancel {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-confirm {
      flex: 2;
      padding: 10px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 履歴モーダル */
    #history-box {
      background: #1a1a1a;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #2a2a2a;
    }
    #history-box h3 { font-size: 16px; margin-bottom: 16px; color: #eee; }
    .history-row {
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 13px;
    }
    .history-row:last-child { border-bottom: none; }
    .history-top { display: flex; justify-content: space-between; align-items: center; }
    .history-borrower { color: #eee; font-weight: 500; }
    .history-action-borrow { color: #f87171; font-size: 12px; }
    .history-action-return { color: #4ade80; font-size: 12px; }
    .history-date { color: #555; font-size: 11px; margin-top: 4px; }
    .history-sd { font-size: 11px; color: #60a5fa; margin-top: 3px; }
    .history-empty { color: #555; font-size: 13px; padding: 12px 0; }

    #scan-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #scan-modal.show { display: flex; }
    #scan-reader {
      width: 300px;
      border: 2px solid #FF7A00;
      border-radius: 12px;
      overflow: hidden;
    }
    #scan-close {
      margin-top: 20px;
      padding: 10px 32px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
      position: relative;
    }
    #scan-result {
      margin-top: 12px;
      color: #fff;
      font-size: 14px;
      text-align: center;
    }
    .admin-link {
      display: inline-block;
      margin-bottom: 8px;
      padding: 6px 14px;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
    }
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <h1>CAMERA POOL</h1>
  <a class="admin-link" href="admin.html">📊 管理画面</a>
  <button class="scan-btn" onclick="openScan()">📷 QRをスキャンして借りる／返す</button>
  <div id="camera-list">読み込み中...</div>

  <!-- QRモーダル -->
  <div id="qr-modal">
    <div id="qr-box">
      <p id="qr-name"></p>
      <div id="qr-canvas"></div>
      <div id="print-area" style="display:none">
        <div id="print-canvas"></div>
        <p id="print-name" style="color:#111;font-weight:bold;margin-top:8px"></p>
      </div>
      <br>
      <button id="qr-print" onclick="printQR()">🖨️ 印刷</button>
      <button id="qr-close" onclick="closeQR()">閉じる</button>
    </div>
  </div>

  <!-- 貸出モーダル -->
  <div id="borrow-modal">
    <div id="borrow-box">
      <h3>カメラを借りる</h3>
      <div class="cam-label" id="borrow-cam-label"></div>
      <div class="form-label">あなたの名前</div>
      <input class="form-input" id="borrow-name" type="text" placeholder="例: 山田太郎">
      <div class="checkbox-row">
        <input type="checkbox" id="sd-check" onchange="toggleSD()">
        <label for="sd-check">自分のSDカードを持っている</label>
      </div>
      <div id="sd-name-area">
        <div class="form-label">SDカードの名前・メモ</div>
        <input class="form-input" id="sd-name" type="text" placeholder="例: SanDisk 64GB">
      </div>
      <div class="btn-row-borrow">
        <button class="btn-cancel" onclick="closeBorrow()">キャンセル</button>
        <button class="btn-confirm" onclick="confirmBorrow()">借りる</button>
      </div>
    </div>
  </div>

  <!-- 履歴モーダル -->
  <div id="history-modal">
    <div id="history-box">
      <h3 id="history-title">履歴</h3>
      <div id="history-content"></div>
      <button id="history-close" onclick="closeHistory()" style="margin-top:16px">閉じる</button>
    </div>
  </div>

  <!-- スキャンモーダル -->
  <div id="scan-modal">
    <div id="scan-reader"></div>
    <div id="scan-result"></div>
    <button id="scan-close" onclick="closeScan()">閉じる</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://fvsziepnqtthutpsvtjl.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2c3ppZXBucXR0aHV0cHN2dGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTAyMzksImV4cCI6MjA5MzA4NjIzOX0.mjIWmBHp0I-kBYk5UNNmRKzQipMtlDQIRjVRaxP3QUk'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let html5QrCode = null
    let currentQRId = null
    let currentQRName = null
    let pendingCam = null

    // SDチェックボックス切り替え
    function toggleSD() {
      const checked = document.getElementById('sd-check').checked
      document.getElementById('sd-name-area').style.display = checked ? 'block' : 'none'
    }

    // 貸出モーダルを開く
    function openBorrow(cam) {
      pendingCam = cam
      document.getElementById('borrow-cam-label').textContent = cam.name
      document.getElementById('borrow-name').value = ''
      document.getElementById('sd-check').checked = false
      document.getElementById('sd-name').value = ''
      document.getElementById('sd-name-area').style.display = 'none'
      document.getElementById('borrow-modal').classList.add('show')
    }

    function closeBorrow() {
      document.getElementById('borrow-modal').classList.remove('show')
      pendingCam = null
    }

    async function confirmBorrow() {
      const name = document.getElementById('borrow-name').value.trim()
      if (!name) { alert('名前を入力してください'); return; }

      const hasSD = document.getElementById('sd-check').checked
      const sdName = hasSD ? document.getElementById('sd-name').value.trim() : ''

      const borrowerText = hasSD && sdName ? `${name}（自分のSD: ${sdName}）` : name
      const sdInfo = hasSD ? (sdName || '自分のSD') : 'カメラのSD'

      await db.from('cameras').update({
        status: 'borrowed',
        borrower: borrowerText
      }).eq('id', pendingCam.id)

      await db.from('history').insert({
        camera_name: pendingCam.name,
        borrower: name,
        action: '貸出',
        sd_info: sdInfo
      })

      closeBorrow()
      loadCameras()
    }

    // QR表示
    function showQR(cameraId, cameraName) {
      currentQRId = cameraId
      currentQRName = cameraName
      document.getElementById('qr-name').textContent = cameraName
      const canvas = document.getElementById('qr-canvas')
      canvas.innerHTML = ''
      new QRCode(canvas, { text: cameraId, width: 200, height: 200 })
      document.getElementById('qr-modal').classList.add('show')
    }

    function printQR() {
      const printArea = document.getElementById('print-area')
      const printCanvas = document.getElementById('print-canvas')
      const printName = document.getElementById('print-name')
      printCanvas.innerHTML = ''
      printName.textContent = currentQRName
      new QRCode(printCanvas, { text: currentQRId, width: 300, height: 300 })
      printArea.style.display = 'block'
      setTimeout(() => { window.print(); printArea.style.display = 'none' }, 300)
    }

    function closeQR() {
      document.getElementById('qr-modal').classList.remove('show')
    }

    // 履歴表示
    async function showHistory(cameraName) {
      document.getElementById('history-title').textContent = cameraName + ' の履歴'
      document.getElementById('history-content').innerHTML = '読み込み中...'
      document.getElementById('history-modal').classList.add('show')

      const { data, error } = await db.from('history')
        .select('*')
        .eq('camera_name', cameraName)
        .order('created_at', { ascending: false })
        .limit(20)

      if (error || !data || data.length === 0) {
        document.getElementById('history-content').innerHTML =
          '<div class="history-empty">履歴はまだありません</div>'
        return
      }

      document.getElementById('history-content').innerHTML = data.map(h => {
        const d = new Date(new Date(h.created_at).getTime() + 9 * 60 * 60 * 1000)
const date = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`
        const sdHtml = h.sd_info
          ? `<div class="history-sd">💾 ${h.sd_info}</div>`
          : ''
        return `
          <div class="history-row">
            <div class="history-top">
              <div class="history-borrower">${h.borrower}</div>
              <div class="${h.action === '貸出' ? 'history-action-borrow' : 'history-action-return'}">${h.action}</div>
            </div>
            ${sdHtml}
            <div class="history-date">${date}</div>
          </div>
        `
      }).join('')
    }

    function closeHistory() {
      document.getElementById('history-modal').classList.remove('show')
    }

    // スキャン
    function openScan() {
      document.getElementById('scan-modal').classList.add('show')
      html5QrCode = new Html5Qrcode('scan-reader')
      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: 250 },
        async (decodedText) => { await handleScan(decodedText) }
      )
    }

    function closeScan() {
      if (html5QrCode) {
        try {
          html5QrCode.stop().catch(() => {}).finally(() => { html5QrCode = null })
        } catch(e) { html5QrCode = null }
      }
      document.getElementById('scan-modal').classList.remove('show')
      document.getElementById('scan-result').textContent = ''
    }

    async function handleScan(cameraId) {
      try { await html5QrCode.stop() } catch(e) {}
      html5QrCode = null

      const { data: cameras } = await db.from('cameras').select('*').eq('id', cameraId)
      if (!cameras || cameras.length === 0) {
        document.getElementById('scan-result').textContent = '❌ カメラが見つかりません'
        return
      }
      const cam = cameras[0]

      document.getElementById('scan-modal').classList.remove('show')

      if (cam.status === 'available') {
        openBorrow(cam)
      } else {
        await db.from('cameras').update({ status: 'available', borrower: '' }).eq('id', cameraId)
        await db.from('history').insert({
          camera_name: cam.name,
          borrower: cam.borrower.split('（')[0],
          action: '返却',
          sd_info: null
        })
        loadCameras()
        alert(`✅ ${cam.name} を返却しました！`)
      }
    }

    async function loadCameras() {
      const list = document.getElementById('camera-list')
      list.innerHTML = '<div style="color:#555;font-size:13px;padding:12px 0">⏳ 読み込み中...</div>'
      const { data, error } = await db.from('cameras').select('*')
      if (error) { console.error(error); return; }
      list.innerHTML = data.map(cam => {
        const isOwn = cam.borrower && cam.borrower.includes('自分のSD')
        const sdBadge = cam.status === 'borrowed'
          ? `<span class="sd-badge ${isOwn ? 'sd-own' : 'sd-camera'}">${isOwn ? '💾 自分のSD' : '📷 カメラのSD'}</span>`
          : ''
        return `
          <div class="camera-card">
            <div class="camera-name" onclick="showHistory('${cam.name}')">${cam.name}</div>
            <div style="margin-top:4px">
              <span class="${cam.status === 'available' ? 'status-ok' : 'status-ng'}">
                ${cam.status === 'available' ? '● 貸出可能' : '● 貸出中 — ' + cam.borrower}
              </span>
              ${sdBadge}
            </div>
            <button class="qr-btn" onclick="showQR('${cam.id}', '${cam.name}')">QRを表示</button>
          </div>
        `
      }).join('')
    }

    loadCameras()
  </script>
</body>
</html>
