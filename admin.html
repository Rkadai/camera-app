<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | CAMERA POOL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      border: 1px solid #2a2a2a;
    }
    .stat-num { font-size: 36px; font-weight: bold; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: #666; }
    .num-borrowed { color: #f87171; }
    .num-available { color: #4ade80; }
    h2 { font-size: 15px; color: #888; margin-bottom: 12px; letter-spacing: 1px; }
    .lend-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      border: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .lend-name { font-size: 15px; font-weight: bold; }
    .lend-cam { font-size: 12px; color: #888; margin-top: 3px; }
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 6px 14px;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
    .empty { color: #555; font-size: 14px; padding: 16px 0; }
    .add-form {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .add-form input {
      flex: 1;
      padding: 8px 12px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #eee;
      font-size: 14px;
    }
    .add-form input::placeholder { color: #555; }
    .add-btn {
      padding: 8px 16px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    .camera-row {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      border: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cam-info { flex: 1; }
    .cam-name { font-size: 15px; font-weight: bold; }
    .cam-status { font-size: 12px; color: #888; margin-top: 3px; }
    .delete-btn {
      padding: 5px 12px;
      background: transparent;
      color: #f87171;
      border: 1px solid #f87171;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .delete-btn:hover { background: #2a1010; }
    .history-sd { font-size: 11px; color: #60a5fa; margin-top: 3px; }
    .logout-btn {
      float: right;
      padding: 5px 12px;
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    /* ログイン画面 */
    #login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    #login-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
      border: 1px solid #2a2a2a;
    }
    #login-box h2 {
      font-size: 20px;
      color: #eee;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    #login-box p {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .login-label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .login-input {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    .login-input:focus { outline: none; border-color: #FF7A00; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #FF7A00;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-error {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    #dashboard { display: none; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div id="login-box">
      <h2>DASHBOARD</h2>
      <p>管理者のみアクセスできます</p>
      <div class="login-label">メールアドレス</div>
      <input class="login-input" id="login-email" type="email" placeholder="admin@example.com">
      <div class="login-label">パスワード</div>
      <input class="login-input" id="login-password" type="password" placeholder="••••••••">
      <button class="login-btn" onclick="login()">ログイン</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- 管理画面 -->
  <div id="dashboard">
    <button class="logout-btn" onclick="logout()">ログアウト</button>
    <a class="back-btn" href="index.html">← 一覧に戻る</a>
    <h1>DASHBOARD</h1>
    <p class="subtitle">貸出状況 · リアルタイム</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num num-borrowed" id="count-borrowed">-</div>
        <div class="stat-label">貸出中</div>
      </div>
      <div class="stat-card">
        <div class="stat-num num-available" id="count-available">-</div>
        <div class="stat-label">貸出可能</div>
      </div>
    </div>

    <h2>貸出中のカメラ</h2>
    <div id="borrowed-list">読み込み中...</div>

    <h2 style="margin-top:24px">カメラを追加</h2>
    <div class="add-form">
      <input type="text" id="new-camera-name" placeholder="例: Canon EOS R10">
      <button class="add-btn" onclick="addCamera()">＋ 追加</button>
    </div>

    <h2>カメラ一覧 · 管理</h2>
    <div id="camera-manage-list">読み込み中...</div>

    <h2 style="margin-top:24px">貸出履歴 · 全件</h2>
    <div id="history-list">読み込み中...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fvsziepnqtthutpsvtjl.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2c3ppZXBucXR0aHV0cHN2dGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTAyMzksImV4cCI6MjA5MzA4NjIzOX0.mjIWmBHp0I-kBYk5UNNmRKzQipMtlDQIRjVRaxP3QUk'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    // ログイン
    async function login() {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      const errorEl = document.getElementById('login-error')
      errorEl.textContent = ''

      const { error } = await db.auth.signInWithPassword({ email, password })
      if (error) {
        errorEl.textContent = 'メールアドレスまたはパスワードが違います'
        return
      }
      showDashboard()
    }

    // ログアウト
    async function logout() {
      await db.auth.signOut()
      document.getElementById('dashboard').style.display = 'none'
      document.getElementById('login-screen').style.display = 'flex'
    }

    // ダッシュボードを表示
    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('dashboard').style.display = 'block'
      loadDashboard()
      loadHistory()
    }

    // ページ読み込み時にセッション確認
    db.auth.getSession().then(({ data }) => {
      if (data.session) {
        showDashboard()
      }
    })

    async function loadDashboard() {
      const { data, error } = await db.from('cameras').select('*')
      if (error) { console.error(error); return; }

      const borrowed = data.filter(c => c.status === 'borrowed')
      const available = data.filter(c => c.status === 'available')

      document.getElementById('count-borrowed').textContent = borrowed.length
      document.getElementById('count-available').textContent = available.length

      const borrowedList = document.getElementById('borrowed-list')
      if (borrowed.length === 0) {
        borrowedList.innerHTML = '<div class="empty">現在貸出中のカメラはありません</div>'
      } else {
        borrowedList.innerHTML = borrowed.map(cam => `
          <div class="lend-card">
            <div>
              <div class="lend-name">${cam.borrower}</div>
              <div class="lend-cam">${cam.name}</div>
            </div>
          </div>
        `).join('')
      }

      const manageList = document.getElementById('camera-manage-list')
      manageList.innerHTML = data.map(cam => `
        <div class="camera-row">
          <div class="cam-info">
            <div class="cam-name">${cam.name}</div>
            <div class="cam-status">${cam.status === 'available' ? '● 貸出可能' : '● 貸出中 — ' + cam.borrower}</div>
          </div>
          <button class="delete-btn" onclick="deleteCamera('${cam.id}', '${cam.name}')">削除</button>
        </div>
      `).join('')
    }

    async function loadHistory() {
      const { data, error } = await db.from('history').select('*').order('created_at', { ascending: false }).limit(50)
      if (error) { console.error(error); return; }

      const list = document.getElementById('history-list')
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty">履歴はまだありません</div>'
        return
      }
      list.innerHTML = data.map(h => {
        const d = new Date(new Date(h.created_at).getTime() + 9 * 60 * 60 * 1000)
        const date = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`
        const sdHtml = h.sd_info ? `<div class="history-sd">💾 ${h.sd_info}</div>` : ''
        return `
          <div class="lend-card">
            <div>
              <div class="lend-name">${h.borrower}</div>
              <div class="lend-cam">${h.camera_name}</div>
              ${sdHtml}
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:${h.action === '貸出' ? '#f87171' : '#4ade80'}">${h.action}</div>
              <div style="font-size:11px;color:#555;margin-top:2px">${date}</div>
            </div>
          </div>
        `
      }).join('')
    }

    async function addCamera() {
      const input = document.getElementById('new-camera-name')
      const name = input.value.trim()
      if (!name) { alert('カメラ名を入力してください'); return; }

      const { error } = await db.from('cameras').insert({ name: name, status: 'available', borrower: '' })
      if (error) { console.error(error); alert('追加に失敗しました'); return; }

      input.value = ''
      loadDashboard()
    }

    async function deleteCamera(id, name) {
      if (!confirm(`「${name}」を削除しますか？`)) return

      const { error } = await db.from('cameras').delete().eq('id', id)
      if (error) { console.error(error); alert('削除に失敗しました'); return; }

      loadDashboard()
    }

    setInterval(loadDashboard, 30000)
  </script>
</body>
</html>
